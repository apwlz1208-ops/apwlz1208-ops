name: Generate Contribution Snake

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Generate Perfect Snake
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate Premium Snake
        uses: Platane/snk@v3
        with:
          github_user_name: apwlz1208-ops
          # 🎨 完美配色方案，和你发的图一致
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github&animate=true&grid=true&scale=1
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&animate=true&grid=true&scale=1
            dist/github-snake-colorful.svg?palette=contribution&animate=true&grid=true&scale=1.2

      - name: Deploy to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          force_orphan: true
