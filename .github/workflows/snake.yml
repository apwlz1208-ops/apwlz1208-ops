name: Generate Contribution Snake

on:
  push:
    branches: [ main ]  # 你的主分支名，不是main就改成master
  schedule:
    - cron: '0 0 * * *'  # 每天0点自动更新，可自定义
  workflow_dispatch:     # 支持手动触发（调试必备）

jobs:
  build:
    runs-on: ubuntu-latest
    name: Generate Snake
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 必须，获取完整提交历史

      - name: Generate GitHub Contribution Snake
        uses: Platane/snk@v3  # 用稳定版，避免兼容性问题
        with:
          github_user_name:apwlz1208-ops # 你的GitHub用户名
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-snake.svg?color=blue
            dist/github-snake.svg?color=purple&background=222222

      - name: Deploy to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}  # 系统自动生成，不用自己建
          publish_dir: ./dist
          publish_branch: output  # 输出到output分支，干净不污染主分支
          force_orphan: true     # 只存SVG文件，历史干净
