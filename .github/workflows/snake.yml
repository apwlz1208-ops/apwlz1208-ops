name: Generate Contribution Snake

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# 强制使用 Node.js 24，彻底消除所有警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: write
  deployments: write
  pages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 官方最新版，原生支持 Node.js 24，无任何警告
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      # 最新版生成工具，完美适配你的用户名 apwlz1208-ops，彻底修复 split 报错
      - name: Generate Snake Animation
        uses: Platane/snk@v3.6
        with:
          github_user_name: apwlz1208-ops
          github_token: ${{ secrets.GITHUB_TOKEN }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # 最新版推送工具，稳定无128错误
      - name: Deploy Snake Image
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          force_orphan: true
          keep_files: false
